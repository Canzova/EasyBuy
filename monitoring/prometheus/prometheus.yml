global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8083

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8079

  - job_name: service-registry
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8761

  - job_name: product-category-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8082

  - job_name: cart-order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8084

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8086

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8087
