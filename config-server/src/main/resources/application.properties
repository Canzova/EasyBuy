spring.application.name=config-server
server.port=8079

# Git config
spring.cloud.config.server.git.uri=https://github.com/Canzova/easybuy-config
spring.cloud.config.server.git.username=canzova
spring.cloud.config.server.git.password=${GITHUB_PASSWORD}
spring.cloud.config.server.git.defaultLabel=main

# Encryption
encrypt.key=qwertyuygfxcvbnk98765432qwertyuiugfcxvbnko8765esdfgh

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=user
spring.rabbitmq.password=password

management.endpoints.web.exposure.include=*

# For enabling logging
logging.level.root=INFO
logging.level.com.easybuy=DEBUG
logging.level.easybuy=DEBUG

# Metrics tags
management.metrics.tags.application=${spring.application.name}

# Log file
logging.file.name=logs/${spring.application.name}.log

# Log patterns
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} : %msg%n
logging.pattern.console=%d{HH:mm:ss} %-5level %logger{36} : %msg%n